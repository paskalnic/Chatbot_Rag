data:
  source_dir: "./data/raw"
  processed_dir: "./data/processed"

chunking:
  strategy: "recursive"
  chunk_size: 500
  chunk_overlap: 50

vectorstore:
  provider: "chroma"
  persist_dir: "./data/chroma_db"
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"

retrieval:
  top_k: 5
  score_threshold: 0.3

llm:
  model: "mistral"
  temperature: 0.0
  max_tokens: 1000

logging:
  level: "INFO"
  log_file: "./logs/pipeline.log"
